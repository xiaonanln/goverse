services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: goverse-etcd
    command:
      - /usr/local/bin/etcd
      - --name=etcd0
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-peer-urls=http://0.0.0.0:2380
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd-data:/etcd-data

  postgres:
    image: postgres:16-alpine
    container_name: goverse-postgres
    environment:
      POSTGRES_DB: goverse
      POSTGRES_USER: goverse
      POSTGRES_PASSWORD: goverse
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  etcd-data:
  postgres-data:
