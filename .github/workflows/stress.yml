name: Stress Test

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  chat-stress-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup test environment
        uses: ./.github/actions/setup-test-env
        with:
          enable-postgres: 'false'
      
      - name: Install PyYAML
        run: python3 -m pip install pyyaml
      
      - name: Create coverage directory
        run: mkdir -p /tmp/coverage-chat
      
      - name: Run chat stress test for 5 minutes with coverage
        env:
          GOCOVERDIR: /tmp/coverage-chat
          ENABLE_COVERAGE: "true"
        run: |
          python3 tests/samples/chat/stress/stress_test.py --duration 300
      
      - name: Convert coverage data to text format
        run: |
          # We collect runtime coverage under a single directory (/tmp/coverage-chat),
          # so we can convert it directly without a merge step.
          if [ -d /tmp/coverage-chat ]; then
            go tool covdata textfmt -i=/tmp/coverage-chat -o=coverage-chat-stress.out
          else
            echo "No coverage data found at /tmp/coverage-chat"; exit 0;
          fi

      - name: Upload coverage to Codecov
        if: ${{ hashFiles('coverage-chat-stress.out') != '' }}
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage-chat-stress.out
          flags: stress-chat
          name: stress-chat
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  demo-stress-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup test environment
        uses: ./.github/actions/setup-test-env
        with:
          enable-postgres: 'true'

      - name: Provision Postgres role for demo config
        # stress_config_demo.yml authenticates as goverse/goverse to match the
        # docker-compose defaults developers use locally; the shared setup step
        # only configures the postgres superuser, so add the role here.
        run: |
          sudo -u postgres psql -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='goverse') THEN CREATE ROLE goverse LOGIN PASSWORD 'goverse'; END IF; END \$\$;"
          sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE goverse TO goverse;"
          sudo -u postgres psql -d goverse -c "GRANT ALL ON SCHEMA public TO goverse;"

      - name: Initialize Goverse schema
        run: go run ./cmd/pgadmin --config samples/sharding_demo/stress_config_demo.yml init

      - name: Install PyYAML
        run: python3 -m pip install pyyaml

      - name: Create coverage directory
        run: mkdir -p /tmp/coverage-demo

      - name: Run demo server stress test for 5 minutes with coverage
        env:
          GOCOVERDIR: /tmp/coverage-demo
          ENABLE_COVERAGE: "true"
        run: |
          python3 samples/sharding_demo/stress_test_demo.py --duration 300 --clients 10
      
      - name: Convert coverage data to text format
        run: |
          # We collect runtime coverage under a single directory (/tmp/coverage-demo),
          # so we can convert it directly without a merge step.
          if [ -d /tmp/coverage-demo ]; then
            go tool covdata textfmt -i=/tmp/coverage-demo -o=coverage-demo-stress.out
          else
            echo "No coverage data found at /tmp/coverage-demo"; exit 0;
          fi

      - name: Upload coverage to Codecov
        if: ${{ hashFiles('coverage-demo-stress.out') != '' }}
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage-demo-stress.out
          flags: stress-demo
          name: stress-demo
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  demo-stress-test-churn:
    # Same as demo-stress-test but with node churn enabled: a random demo
    # server is killed + restarted every --churn-interval seconds, and the
    # script fails if any counter's server value regresses below the highest
    # value any client observed. Exercises the shard-migration persistence
    # path end-to-end.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup test environment
        uses: ./.github/actions/setup-test-env
        with:
          enable-postgres: 'true'

      - name: Provision Postgres role for demo config
        run: |
          sudo -u postgres psql -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='goverse') THEN CREATE ROLE goverse LOGIN PASSWORD 'goverse'; END IF; END \$\$;"
          sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE goverse TO goverse;"
          sudo -u postgres psql -d goverse -c "GRANT ALL ON SCHEMA public TO goverse;"

      - name: Initialize Goverse schema
        run: go run ./cmd/pgadmin --config samples/sharding_demo/stress_config_demo.yml init

      - name: Install PyYAML
        run: python3 -m pip install pyyaml

      - name: Create coverage directory
        run: mkdir -p /tmp/coverage-demo-churn

      - name: Run demo server stress test with node churn
        env:
          GOCOVERDIR: /tmp/coverage-demo-churn
          ENABLE_COVERAGE: "true"
        run: |
          python3 samples/sharding_demo/stress_test_demo.py \
            --duration 300 \
            --clients 10 \
            --churn-enabled \
            --churn-interval 30 \
            --churn-downtime 2

      - name: Convert coverage data to text format
        run: |
          if [ -d /tmp/coverage-demo-churn ]; then
            go tool covdata textfmt -i=/tmp/coverage-demo-churn -o=coverage-demo-churn-stress.out
          else
            echo "No coverage data found at /tmp/coverage-demo-churn"; exit 0;
          fi

      - name: Upload coverage to Codecov
        if: ${{ hashFiles('coverage-demo-churn-stress.out') != '' }}
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage-demo-churn-stress.out
          flags: stress-demo-churn
          name: stress-demo-churn
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  wallet-stress-test:
    # Drives the reliable-call sample end to end: clients retry ~30% of
    # Deposit/Withdraw calls with the same call_id, and the test fails if
    # any retry sees a different outcome or the per-wallet server balance
    # diverges from the expected sum. Requires Postgres because reliable-
    # call dedup state is persisted there.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup test environment
        uses: ./.github/actions/setup-test-env
        with:
          enable-postgres: 'true'

      - name: Provision Postgres role for wallet config
        run: |
          sudo -u postgres psql -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='goverse') THEN CREATE ROLE goverse LOGIN PASSWORD 'goverse'; END IF; END \$\$;"
          sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE goverse TO goverse;"
          sudo -u postgres psql -d goverse -c "GRANT ALL ON SCHEMA public TO goverse;"

      - name: Initialize Goverse schema
        run: go run ./cmd/pgadmin --config samples/wallet/stress_config.yml init

      - name: Install PyYAML
        run: python3 -m pip install pyyaml

      - name: Create coverage directory
        run: mkdir -p /tmp/coverage-wallet

      - name: Run wallet reliable-call stress test
        env:
          GOCOVERDIR: /tmp/coverage-wallet
          ENABLE_COVERAGE: "true"
        run: |
          python3 samples/wallet/stress_test.py --duration 120 --clients 8

      - name: Convert coverage data to text format
        run: |
          if [ -d /tmp/coverage-wallet ]; then
            go tool covdata textfmt -i=/tmp/coverage-wallet -o=coverage-wallet-stress.out
          else
            echo "No coverage data found at /tmp/coverage-wallet"; exit 0;
          fi

      - name: Upload coverage to Codecov
        if: ${{ hashFiles('coverage-wallet-stress.out') != '' }}
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage-wallet-stress.out
          flags: stress-wallet
          name: stress-wallet
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  bomberman-stress-test:
    # Drives the bomberman sample end to end: N concurrent clients
    # cycle through JoinQueue → wait-for-match-end → JoinQueue, and
    # the test fails if any player's total_matches doesn't increment
    # by exactly 1 per cycle (proving Match → Player.RecordMatchResult
    # reliable-call dedup holds). Postgres is required because the
    # reliable-call dedup state is persisted there. Match length is
    # capped to 5 s via BOMBERMAN_MATCH_TIME_LIMIT_TICKS so a CI run
    # turns over many matches.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup test environment
        uses: ./.github/actions/setup-test-env
        with:
          enable-postgres: 'true'

      - name: Provision Postgres role for bomberman config
        run: |
          sudo -u postgres psql -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='goverse') THEN CREATE ROLE goverse LOGIN PASSWORD 'goverse'; END IF; END \$\$;"
          sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE goverse TO goverse;"
          sudo -u postgres psql -d goverse -c "GRANT ALL ON SCHEMA public TO goverse;"

      - name: Initialize Goverse schema
        run: go run ./cmd/pgadmin --config samples/bomberman/stress_config.yml init

      - name: Install PyYAML
        run: python3 -m pip install pyyaml

      - name: Create coverage directory
        run: mkdir -p /tmp/coverage-bomberman

      - name: Run bomberman stress test
        env:
          GOCOVERDIR: /tmp/coverage-bomberman
          ENABLE_COVERAGE: "true"
        run: |
          python3 samples/bomberman/stress_test.py --duration 120 --clients 8 --match-ticks 50

      - name: Convert coverage data to text format
        run: |
          if [ -d /tmp/coverage-bomberman ]; then
            go tool covdata textfmt -i=/tmp/coverage-bomberman -o=coverage-bomberman-stress.out
          else
            echo "No coverage data found at /tmp/coverage-bomberman"; exit 0;
          fi

      - name: Upload coverage to Codecov
        if: ${{ hashFiles('coverage-bomberman-stress.out') != '' }}
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage-bomberman-stress.out
          flags: stress-bomberman
          name: stress-bomberman
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
