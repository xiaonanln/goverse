# Bomberman stress test cluster — 1 inspector, 3 server nodes, 2 gates.
# Reliable calls (Match → Player.RecordMatchResult on match end) require
# Postgres-backed persistence, so this config wires it in.

version: 1

postgres:
  host: "127.0.0.1"
  port: 5432
  user: "goverse"
  password: "goverse"
  database: "goverse"
  sslmode: "disable"
  max_open_conns: 4
  max_idle_conns: 4

inspector:
  http_addr: "0.0.0.0:8190"
  grpc_addr: "0.0.0.0:8191"
  advertise_addr: "localhost:8191"

cluster:
  shards: 64
  provider: "etcd"
  etcd:
    endpoints:
      - "127.0.0.1:2379"
    prefix: "/goverse/bomberman-stress-test"

  # MatchmakingQueue is a singleton: the leader services it, but every
  # node loads the type so the object survives shard re-ownership
  # without an explicit re-creation step.
  auto_load_objects:
    - type: "MatchmakingQueue"
      id: "MatchmakingQueue"

nodes:
  - id: "bomberman-node-1"
    grpc_addr: "0.0.0.0:9411"
    advertise_addr: "localhost:9411"
    http_addr: "0.0.0.0:8411"

  - id: "bomberman-node-2"
    grpc_addr: "0.0.0.0:9412"
    advertise_addr: "localhost:9412"
    http_addr: "0.0.0.0:8412"

  - id: "bomberman-node-3"
    grpc_addr: "0.0.0.0:9413"
    advertise_addr: "localhost:9413"
    http_addr: "0.0.0.0:8413"

gates:
  # The first gate exposes the HTTP / SSE client API on :8080 so the
  # browser sample (samples/bomberman/web/) can reach it. Without
  # http_addr set, the gate runs gRPC only and any EventSource from
  # the web UI hangs on "Connecting…".
  - id: "bomberman-gate-1"
    grpc_addr: "0.0.0.0:10311"
    http_addr: "0.0.0.0:8080"

  - id: "bomberman-gate-2"
    grpc_addr: "0.0.0.0:10312"

# Access control. Anything not matched here is REJECTed (default deny).
#
# - ALLOW    : both clients (via gate) and nodes (cross-object) may call
# - EXTERNAL : clients only, deny nodes
# - INTERNAL : nodes only, deny clients via gate
#
# The cheating attack we're closing: without these rules, a malicious
# client could POST directly to /api/v1/objects/call/Player/...
# /RecordMatchResult and grant themselves wins. Marking it INTERNAL
# means only Match.recordResults running server-side can invoke it;
# any direct client call is denied at the gate.
object_access_rules:
  # Matchmaking entry / status. Clients drive these.
  - type: MatchmakingQueue
    method: /(JoinQueue|LeaveQueue|QueueStatus)/
    access: ALLOW

  # In-match player input + read paths. Clients send these every tick.
  - type: Match
    method: /(HandleInput|GetSnapshot)/
    access: ALLOW

  # Match lifecycle is server-side only — only MatchmakingQueue should
  # AddPlayer / StartMatch on a Match. A direct client call would
  # bypass matchmaking.
  - type: Match
    method: /(AddPlayer|StartMatch)/
    access: INTERNAL

  # Player stats: clients can read theirs (no row-level auth yet —
  # any client can read any player's stats; harmless leakage in this
  # demo). Mutating wins/losses is server-side only.
  - type: Player
    method: GetStats
    access: ALLOW

  - type: Player
    method: RecordMatchResult
    access: INTERNAL
